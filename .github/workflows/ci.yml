name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.24'

jobs:
  build:
    name: build & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go build ./...
      - run: go vet ./...

  test:
    name: test (race + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Tests
        run: go test -race -coverprofile=coverage.out -coverpkg=./zaplogger/... ./...
      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | tail -5
          pct=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}')
          echo "**Total coverage: ${pct}**" >> "$GITHUB_STEP_SUMMARY"
      - uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          fail_ci_if_error: false

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          # govulncheck@v1.3.0+ requires Go >= 1.25
          go-version: '1.26'
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
